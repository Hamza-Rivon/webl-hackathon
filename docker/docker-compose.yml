# WEBL Production Docker Compose
# Single command deployment: docker-compose up -d --build

version: "3.9"

services:
  # ==================== REDIS ====================
  redis:
    image: redis:7-alpine
    container_name: webl-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory-policy noeviction
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webl-network

  # ==================== API SERVER ====================
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: webl-api
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - webl-network

  # ==================== WORKERS ====================
  workers:
    build:
      context: ..
      dockerfile: docker/Dockerfile.workers
    container_name: webl-workers
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    # Workers need memory for FFmpeg rendering
    # FFmpeg rendering is more memory-efficient than Remotion (no Chrome/Chromium)
    # 4G should be sufficient for concurrent FFmpeg operations
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    networks:
      - webl-network

  # ==================== NGINX ====================
  nginx:
    image: nginx:alpine
    container_name: webl-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - webl-network

volumes:
  redis_data:
    driver: local

networks:
  webl-network:
    driver: bridge
